<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>👶 Talking Kindergarten AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #12121c;
  color: white;
}

.header {
  text-align: center;
  padding: 12px;
  background: #0d0d14;
}

.chat {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user { background: #10a37f; margin-left: auto; }
.bot { background: #2b2b3d; }

.input {
  display: flex;
  padding: 10px;
  background: #0d0d14;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  margin-left: 8px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">👶 Kindergarten AI (REAL CONVERSATION MODE)</div>

<div id="chat" class="chat"></div>

<div class="input">
  <input id="input" placeholder="γράψε κάτι..." />
  <button onclick="send()">Send</button>
  <button onclick="clearChat()">Clear</button>
</div>

<script>

const chat = document.getElementById("chat");

// 🧠 MEMORY (this makes it conversational)
let memory = [];

function add(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function pick(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function countWords(s){
  return s.trim().split(/\s+/).length;
}

// 🤖 CORE CONVERSATION ENGINE
function ai(text){

  const t = text.trim();
  const lower = t.toLowerCase();

  memory.push(t);
  if(memory.length > 5) memory.shift();

  const who = "είμαι 6 χρονών παιδί στο νηπιαγωγείο";

  const reactions = [
    "και προσπαθώ να σε καταλάβω",
    "και αυτό με μπερδεύει λίγο",
    "και το σκέφτομαι σαν παιχνίδι",
    "και δεν είμαι σίγουρος αλλά συνεχίζω"
  ];

  const school = [
    "στο σχολείο κάθομαι και κοιτάω",
    "στην τάξη προσπαθώ να ακούω",
    "στο διάλειμμα παίζω και ξεχνάω",
    "όλα στο σχολείο μου φαίνονται περίεργα"
  ];

  const funny = [
    "νομίζω οι καρέκλες ξέρουν τα πάντα 🪑",
    "το σχολείο είναι μυστήριο 🤯",
    "οι μεγάλοι ξέρουν κάτι που εγώ όχι 👀",
    "το μυαλό μου κάνει pause ⏸️"
  ];

  function buildResponse(){

    let context = "";

    // 👇 conversational memory effect
    if(memory.length > 1){
      context = "πριν μου είπες κάτι και το θυμάμαι λίγο, ";
    }

    let base =
      context +
      who + ", " +
      (lower.includes("σχολ") || lower.includes("school") ? pick(school) : "ακούω αυτό που λες") + ", " +
      pick(reactions) + ", " +
      pick(funny);

    return base;
  }

  function generate40Words(){
    while(true){
      let r = buildResponse();
      let w = countWords(r);
      if(w >= 38 && w <= 40){
        return r;
      }
    }
  }

  return "Είπες: \"" + t + "\" 😄 " + generate40Words();
}

// 💬 SEND
function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  add(text, "user");
  input.value = "";

  setTimeout(() => {
    add(ai(text), "bot");
  }, 200);
}

// 🧹 CLEAR
function clearChat(){
  chat.innerHTML = "";
  memory = [];
}

document.getElementById("input").addEventListener("keypress", e => {
  if(e.key === "Enter") send();
});

</script>

</body>
</html>
